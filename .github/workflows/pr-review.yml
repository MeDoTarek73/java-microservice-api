name: Deploy Backend PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
    # -------------------------------------------------------
    # Validate feature branch
    # -------------------------------------------------------
    - name: Check branch prefix
      id: branch
      run: |
        BRANCH_NAME="${{ github.head_ref }}"

        if [[ $BRANCH_NAME != feature/* ]]; then
          echo "❌ Not a feature branch ($BRANCH_NAME)"
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        IMAGE_TAG=${BRANCH_NAME#feature/}
        IMAGE_TAG=$(echo $IMAGE_TAG \
          | tr '[:upper:]' '[:lower:]' \
          | sed 's/[^a-z0-9-]/-/g' \
          | sed 's/--*/-/g' \
          | sed 's/^-//' \
          | sed 's/-$//' \
          | cut -c1-63)

        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

    # -------------------------------------------------------
    # Checkout
    # -------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    # -------------------------------------------------------
    # Setup Java
    # -------------------------------------------------------
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: temurin

    # -------------------------------------------------------
    # Maven cache
    # -------------------------------------------------------
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    # -------------------------------------------------------
    # Build Quarkus app
    # -------------------------------------------------------
    - name: Build application
      run: ./mvnw clean package -DskipTests

    # -------------------------------------------------------
    # Login GHCR
    # -------------------------------------------------------
    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    # -------------------------------------------------------
    # Setup Buildx (REQUIRED)
    # -------------------------------------------------------
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # -------------------------------------------------------
    # Build & Push Backend Image (cached)
    # -------------------------------------------------------
    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/main/docker/Dockerfile.jvm
        push: true
        tags: ghcr.io/${{ github.repository }}:${{ steps.branch.outputs.image_tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # -------------------------------------------------------
    # Setup kubectl
    # -------------------------------------------------------
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: Set up kubectl
      run: |
        echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > kubeconfig
        echo "KUBECONFIG=${{ github.workspace }}/kubeconfig" >> $GITHUB_ENV

    # -------------------------------------------------------
    # Discover matching preview namespaces
    # -------------------------------------------------------
    - name: Discover preview environments
      id: discover
      run: |
        FEATURE="${{ steps.branch.outputs.image_tag }}"

        echo "🔎 Searching namespaces for feature: $FEATURE"

        NAMESPACES=$(kubectl get ns \
          -l preview-env=true,feature-branch=$FEATURE \
          -o jsonpath='{.items[*].metadata.name}')

        if [ -z "$NAMESPACES" ]; then
          echo "✅ No preview environment exists yet — skipping deployment."
          echo "found=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "found=true" >> $GITHUB_OUTPUT
        echo "namespaces=$NAMESPACES" >> $GITHUB_OUTPUT

    # -------------------------------------------------------
    # Update backend inside existing preview environments
    # -------------------------------------------------------
    - name: Update backend deployments
      if: steps.discover.outputs.found == 'true'
      run: |
        IMAGE="ghcr.io/${{ github.repository }}:${{ steps.branch.outputs.image_tag }}"

        for NS in ${{ steps.discover.outputs.namespaces }}; do
          echo "🚀 Updating backend in namespace: $NS"

          kubectl set image deployment/backend-service \
            backend-service=$IMAGE \
            -n $NS || true

          kubectl rollout restart deployment/backend-service -n $NS || true

          kubectl rollout status deployment/backend-service -n $NS
        done
